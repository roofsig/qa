<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROOFSIG QA MATRIX v2.2.1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --amber-black:      oklch(0.06 0.012 75);
    --amber-ghost:      oklch(0.20 0.035 75);
    --amber-decay:      oklch(0.42 0.085 75);
    --amber-sustained:  oklch(0.72 0.145 75);
    --amber-excitation: oklch(0.88 0.170 75);
    --green-ghost:      oklch(0.20 0.060 142);
    --green-decay:      oklch(0.42 0.130 142);
    --green-sustained:  oklch(0.72 0.220 142);
    --green-excitation: oklch(0.88 0.270 142);
    --red-ghost:        oklch(0.15 0.040 28);
    --red-decay:        oklch(0.35 0.090 28);
    --red-sustained:    oklch(0.57 0.180 28);
    --red-excitation:   oklch(0.68 0.230 28);
  }

  html, body {
    background: var(--amber-black);
    color: var(--amber-excitation);
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  a { color: var(--amber-sustained); }

  /* ---- LAYOUT ---- */
  .shell {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 0 40px;
  }

  /* ---- HEADER / STATUS BAR ---- */
  .status-bar {
    background: var(--amber-sustained);
    color: var(--amber-black);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .status-bar .title { font-size: 16px; font-weight: 600; letter-spacing: 0.1em; }

  .status-bar .right { display: flex; align-items: center; gap: 16px; }

  .progress-label { font-size: 13px; font-weight: 500; }

  .btn-reset {
    background: var(--amber-black);
    color: var(--amber-excitation);
    border: 1px solid var(--amber-excitation);
    padding: 2px 10px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    cursor: pointer;
    text-transform: uppercase;
  }
  .btn-reset:hover { background: var(--amber-ghost); }

  /* ---- SECTION ---- */
  .section { border-bottom: 1px solid var(--amber-ghost); }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--amber-ghost);
    user-select: none;
  }
  .section-header:hover { background: oklch(0.09 0.015 75); }

  .section-header .sec-title {
    color: var(--amber-sustained);
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .section-header .sec-right {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 11px;
    color: var(--amber-sustained);
  }

  .sec-progress { font-size: 13px; color: var(--amber-excitation); }

  .collapse-indicator {
    color: var(--amber-sustained);
    font-size: 11px;
    font-weight: 600;
    transition: none;
  }

  /* ---- DIRECTIONS ---- */
  .directions-block {
    display: none;
    background: oklch(0.09 0.015 75);
    border-bottom: 1px solid var(--amber-ghost);
    padding: 12px 16px 12px 32px;
    color: var(--amber-sustained);
    font-size: 14px;
    line-height: 1.8;
    white-space: pre-wrap;
  }
  .directions-block.open { display: block; }

  .directions-label {
    color: var(--amber-excitation);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  /* ---- ROWS ---- */
  .rows-block { display: none; }
  .rows-block.open { display: block; }

  .test-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--amber-ghost);
    cursor: pointer;
    user-select: none;
    min-height: 36px;
  }
  .test-row:hover { background: oklch(0.09 0.015 75); }

  /* state colors */
  .test-row.state-pending .row-id   { color: var(--amber-excitation); }
  .test-row.state-pending .row-text { color: var(--amber-excitation); }
  .test-row.state-pending .row-badge { color: var(--amber-sustained); border-color: var(--amber-sustained); }

  .test-row.state-pass .row-id   { color: var(--green-excitation); }
  .test-row.state-pass .row-text { color: var(--green-excitation); }
  .test-row.state-pass .row-badge { color: var(--green-excitation); border-color: var(--green-excitation); background: var(--green-ghost); }

  .test-row.state-skip .row-id   { color: var(--amber-sustained); text-decoration: line-through; opacity: 0.5; }
  .test-row.state-skip .row-text { color: var(--amber-sustained); text-decoration: line-through; opacity: 0.5; }
  .test-row.state-skip .row-badge { color: var(--amber-sustained); border-color: var(--amber-sustained); opacity: 0.5; }

  .row-badge {
    flex-shrink: 0;
    min-width: 52px;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    border: 1px solid;
    padding: 0 4px;
    line-height: 18px;
    text-transform: uppercase;
  }

  .row-id {
    flex-shrink: 0;
    min-width: 42px;
    font-size: 14px;
    font-weight: 600;
    padding-top: 1px;
  }

  .row-content { flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .row-text { font-size: 15px; }
  .row-verify { font-size: 13px; color: var(--amber-sustained); }

  /* ---- FOOTER ---- */
  .footer {
    padding: 8px 16px;
    font-size: 11px;
    color: var(--amber-decay);
    letter-spacing: 0.06em;
    border-top: 1px solid var(--amber-ghost);
    margin-top: 16px;
  }

  /* ---- PROGRESS BAR ---- */
  .progress-bar-wrap {
    height: 2px;
    background: var(--amber-ghost);
    width: 100%;
  }
  .progress-bar-fill {
    height: 2px;
    background: var(--green-sustained);
    transition: width 0.2s;
    width: 0%;
  }
</style>
</head>
<body>
<div class="shell">
  <div class="status-bar">
    <span class="title">ROOFSIG QA MATRIX v2.2.1</span>
    <div class="right">
      <span class="progress-label" id="progress-label">PROGRESS: 0/0 (0%)</span>
      <button class="btn-reset" id="btn-reset">[RESET]</button>
    </div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar"></div></div>

  <div id="checklist"></div>

  <div class="footer" id="footer">LAST UPDATED: —</div>
</div>

<script>
/* ============================================================
 * DATA
 * ============================================================ */
const SECTIONS = [
  {
    id: 'sec01',
    title: 'SEC 01: INBOUND VOICE (WF-01a)',
    directions: `Pre-requisite: Run lobotomy.sql to reset test phone. Ensure business hours are set to OPEN in BiosScreen > SCHEDULE for the current day. Ensure storm mode is OFF. Have the RoofSig app open on AlertFeed (F2) tab.

1.1-1.3: Call the Twilio tracking number from your test phone. When prompted for SMS consent, press 1. Hang up. Wait for SMS with 3 time slots. Reply with digit "1" to book. After confirmation SMS, reply with a real address (e.g. "316 Congress Ave, Austin TX 78701"). Verify in DB: SELECT stage, consent_sms, pending_slots FROM leads WHERE phone = '+12013203818'. Check AlertFeed shows the alert with parsed ZIP (78701), not Twilio billing ZIP. Check appointments.operator_id IS NULL.

1.4: Run lobotomy.sql. Call again. When prompted for SMS consent, press 2 (decline). Listen for AI voice prompt. Speak a message. Hang up. Check: SELECT * FROM callback_tasks WHERE phone = '+12013203818' ORDER BY created_at DESC LIMIT 1. Verify alert appears in AlertFeed.

1.5: Requires an existing lead in DB (do NOT lobotomize). Call from the same phone. The IVR should recognize you as existing. Press 9 for emergency. Verify: your roofer's escalation phone rings. If no answer after 20s, verify voicemail prompt plays. Check roofer phone for SMS with voicemail link.

1.6: Call again as existing lead. Press 2 for update. Leave a voicemail. Verify: callback_tasks created. Alert appears in AlertFeed. No duplicate lead created: SELECT COUNT(*) FROM leads WHERE phone = '+12013203818' should be 1.

1.7-1.8: Change BiosScreen > SCHEDULE to set current day as CLOSED. Call from test phone. Verify after-hours greeting. Leave voicemail. Check: callback_tasks.bucket = 'after_hours'. Alert in AlertFeed. For 1.8, use existing lead (do not lobotomize first). After testing, restore business hours to OPEN.

1.9: In AlertFeed, find a RADAR-tagged alert. Click the (( RADAR )) badge. CallReviewModal should open. Verify audio playback works.

1.10: After any voicemail test, check the roofer's phone for an SMS containing the Twilio recording URL (.mp3 link).

1.11: Activate storm mode from StormDashboard (F4). Call from test phone. Verify storm IVR plays (not normal IVR). Hang up. Check: SELECT storm_event_id FROM leads WHERE phone = '+12013203818' is not NULL. Deactivate storm mode after test.`,
    tests: [
      { id: '1.1',  text: 'New lead incoming call -- SMS consent path',          verify: "Lead created with stage=sms_sent, consent_sms=true. SMS with 3 slots received." },
      { id: '1.2',  text: 'New lead -- address provided via SMS reply',           verify: "Address parsed correctly. appointments.address updated. ZIP extracted in AlertFeed." },
      { id: '1.3',  text: 'New lead -- no auto-assignment',                       verify: "After booking, appointments.operator_id IS NULL." },
      { id: '1.4',  text: 'New lead -- AI voice entry path (SMS declined)',       verify: "Lead hears AI voice prompt. callback_tasks created. Alert in AlertFeed." },
      { id: '1.5',  text: 'Existing lead -- emergency IVR (digit 9)',             verify: "Call forwarded to roofer escalation phone. Voicemail if no answer." },
      { id: '1.6',  text: 'Existing lead -- update IVR (digit 2)',                verify: "Voicemail recorded. callback_tasks created. Alert in AlertFeed. No duplicate lead." },
      { id: '1.7',  text: 'After hours -- new lead',                              verify: "After-hours greeting. Voicemail. callback_tasks.bucket=after_hours. Alert in AlertFeed." },
      { id: '1.8',  text: 'After hours -- existing lead',                         verify: "Same as 1.7 but lead record updated (not duplicated)." },
      { id: '1.9',  text: 'Voicemail playback',                                   verify: "Call recording accessible via CallReviewModal (click RADAR badge). Audio plays." },
      { id: '1.10', text: 'Roofer receives SMS with voicemail link',              verify: "SMS delivered to roofer phone with recording URL." },
      { id: '1.11', text: 'Storm mode active -- call routes to WF-01',            verify: "Caller hears storm IVR. Lead tagged with storm_event_id." },
    ]
  },
  {
    id: 'sec02',
    title: 'SEC 02: SMS REPLY (WF-01b)',
    directions: `Pre-requisite: Complete test 1.1 so a lead exists with stage=sms_sent and pending_slots populated. Keep your test phone handy for SMS replies.

2.1: Reply "1" to the slots SMS. Verify: SELECT * FROM appointments WHERE lead_id = (SELECT id FROM leads WHERE phone = '+12013203818') ORDER BY created_at DESC LIMIT 1. Appointment exists. operator_appointment_slots row consumed. Confirmation SMS received. Alert appears in AlertFeed.

2.2: Reply with a real address (e.g. "316 Congress Ave, Austin TX 78701"). Verify: appointments.address updated. Check roofer phone for MMS with Google Street View image.

2.3: Run lobotomy.sql, redo 1.1, book a slot. Then reply with gibberish like "xyzzy". Verify error SMS received prompting correct address format.

2.4: Run lobotomy.sql, redo 1.1 (so lead has consent_sms=true). Reply "STOP". Verify: leads.consent_sms = false, leads.stage = 'unresponsive'. Confirmation SMS received.

2.5: Reply "HELP" to the Twilio number. Verify help instructions SMS received.

2.6: After completing 2.1 (lead has appointment), send another digit reply "2". Verify error SMS: "already scheduled". No second appointment in DB.

2.7: Run lobotomy.sql, redo 1.1, book a slot. Then reply with a human message like "Can I come at 4pm instead?". Verify: callback_tasks created. Roofer gets SMS alert.

2.8: After booking (2.1), reply "RESCHEDULE" or similar keyword. Verify: WF-03a fires, new slots SMS received, reschedule_contexts record created.

2.9: Run lobotomy.sql, redo 1.1. Wait >24 hours (or manually expire pending_slots in DB by setting leads.pending_slots = NULL). Reply "1". Verify error SMS: slot no longer available.`,
    tests: [
      { id: '2.1', text: 'Booking digit reply (1/2/3)',                 verify: "Appointment created. Slot consumed. Confirmation SMS received. Alert in AlertFeed." },
      { id: '2.2', text: 'Address reply after booking',                 verify: "appointments.address updated. ZIP extracted. MMS with Street View sent to roofer." },
      { id: '2.3', text: 'Invalid address format',                      verify: "Error SMS received prompting correct format." },
      { id: '2.4', text: 'STOP/opt-out reply',                          verify: "leads.consent_sms=false. leads.stage=unresponsive. Confirmation SMS sent." },
      { id: '2.5', text: 'HELP reply',                                  verify: "Help instructions SMS received." },
      { id: '2.6', text: 'Already booked (duplicate booking attempt)',  verify: "Error SMS: already scheduled. No duplicate appointment." },
      { id: '2.7', text: 'Human/unrecognized reply',                    verify: "callback_tasks created. Roofer alerted via SMS." },
      { id: '2.8', text: 'Reschedule request from SMS',                 verify: "Reschedule flow triggered (WF-03a). Client receives new slot options." },
      { id: '2.9', text: 'Expired slot reply',                          verify: "Error SMS: slot no longer available." },
    ]
  },
  {
    id: 'sec03',
    title: 'SEC 03: MISSED CALL RADAR (WF-02)',
    directions: `Pre-requisite: Run lobotomy.sql. Ensure WF-02 is active in n8n.

3.1: Call the Twilio tracking number from test phone. Let it ring 3-4 times, then hang up (do NOT answer or let it go to voicemail). Wait ~25 seconds (WF-02 has a 20s wait node). Verify: SELECT * FROM callback_tasks WHERE phone = '+12013203818' ORDER BY created_at DESC LIMIT 1 exists. Radar alert appears in AlertFeed with (( RADAR )) badge. Check roofer phone for missed call SMS.

3.2: Do NOT lobotomize. Ensure the lead from 3.1 exists with consent_sms=true (update manually if needed: UPDATE leads SET consent_sms=true WHERE phone='+12013203818'). Call again, let it ring, hang up. Wait 25s. Verify: radar alert shows lead name and address from DB (not "Unknown"). Auto-reengagement SMS sent to test phone.

3.3: Call the Twilio number. This time, let it connect and answer (have a brief >15s conversation or hold). Hang up. Verify: NO alert created. call_events logged with bucket=answered.

3.4: Call the Twilio number. Hang up within 5 seconds. Verify: call_events.bucket = 'abandoned'. Alert created with bucket=abandoned in metadata.

3.5: After 3.2, check the AlertFeed context block. ZIP should show the ZIP from the lead's address field (parsed by COALESCE/regexp_match), NOT the Twilio billing ZIP (FromZip header).

AUTOMATION: Run WF-91 Chaos_Radar from n8n to generate all 6 call status scenarios programmatically. Then manually verify AlertFeed for correct rendering.`,
    tests: [
      { id: '3.1', text: 'Missed call -- new lead',       verify: "CNAM lookup executed. callback_tasks created. Radar alert in AlertFeed. SMS to roofer." },
      { id: '3.2', text: 'Missed call -- existing lead',  verify: "Radar alert with lead name, address, ZIP from lead record. Auto-reengagement SMS sent." },
      { id: '3.3', text: 'Answered call (duration >15s)', verify: "No alert created. Call logged only." },
      { id: '3.4', text: 'Abandoned call (<15s)',         verify: "Classified as abandoned bucket. Alert created." },
      { id: '3.5', text: 'ZIP code correctness',          verify: "Alert shows ZIP from leads.address (parsed), not billing ZIP from Twilio." },
    ]
  },
  {
    id: 'sec04',
    title: 'SEC 04: RESCHEDULE (WF-03a / WF-03b)',
    directions: `Pre-requisite: Complete a full booking (Section 1.1 + 2.1) so an active appointment exists. Keep your test phone.

4.1: Trigger reschedule by replying "RESCHEDULE" to the Twilio number (if supported in WF-01b), or manually POST to /reschedule-initiate with { "appointment_id": "<UUID>" }. Verify: SMS received with 3 new time slots. SELECT * FROM reschedule_contexts WHERE phone = '+12013203818' shows a record with expires_at ~1 hour from now.

4.2: Reply "1" to the reschedule SMS. Verify: appointments.start_at and end_at changed. Old slot freed (operator_appointment_slots.status = 'available'). Confirmation SMS received. reschedule_contexts record deleted.

4.3: Trigger another reschedule (redo 4.1). Reply "7" (invalid). Verify error SMS prompting 1/2/3.

4.4: Trigger reschedule. Manually expire the context: UPDATE reschedule_contexts SET expires_at = NOW() - interval '1 hour' WHERE phone = '+12013203818'. Reply "1". Verify error SMS: context expired.

4.5: Trigger reschedule (4.1) but do NOT reply. Open AlertFeed. Find the alert for this lead. Verify RESCHED badge is visible. Click it. RescheduleModal opens showing the 3 pending slots.

AUTOMATION: Run WF-93 Reschedule_Flow_Test from n8n. It seeds an appointment, triggers initiation, simulates reply "1", and verifies the appointment was updated.`,
    tests: [
      { id: '4.1', text: 'Reschedule initiation',              verify: "Client receives SMS with 3 new time slots. reschedule_contexts record created." },
      { id: '4.2', text: 'Client replies with valid digit',    verify: "Appointment start_at/end_at updated. Old slot freed. Confirmation SMS sent. reschedule_contexts deleted." },
      { id: '4.3', text: 'Client replies with invalid digit',  verify: "Error SMS prompting 1/2/3." },
      { id: '4.4', text: 'Context expired (>1 hour)',          verify: "Error SMS: expired. Must call back." },
      { id: '4.5', text: 'Reschedule badge in AlertFeed',      verify: "Alert with active reschedule_contexts shows RESCHED badge. Click opens RescheduleModal." },
    ]
  },
  {
    id: 'sec05',
    title: 'SEC 05: ESCALATION POLICY (WF-07)',
    directions: `Pre-requisite: Ensure an escalation policy exists in BiosScreen > TUNING. Note the delay_minutes for step 1 (e.g. 5 minutes). Ensure WF-07 is ACTIVE in n8n (it runs every minute via schedule trigger).

5.1: Create an overdue callback: generate a missed call (Section 3.1) to create a callback_tasks record. Wait for the escalation policy's delay_minutes to pass. Verify: SELECT * FROM escalations WHERE callback_task_id = '<task_id>' has a record. Alert appears in AlertFeed with [ESC-L*] badge.

5.2-5.4: These depend on what action types your escalation policy steps are configured for (sms_escalation, call_escalation, email_escalation). For SMS: check roofer's escalation phone. For call: the escalation phone should ring with a TwiML voice message. For email: check the roofer's email inbox.

5.5: Delete all escalation policies from BiosScreen > TUNING. Create a new overdue callback. Wait for WF-07 to fire. Verify: alert created with title containing "escalation policy missing" or similar. Restore policies after test.

5.6: Configure a policy with only 1 step (e.g. SMS at 5 minutes). Create overdue callback. Wait for step to fire. Wait another cycle. Verify: no second escalation record created. DB: SELECT COUNT(*) FROM escalations WHERE callback_task_id = '<task_id>' equals 1.

5.7: After an escalation alert appears in AlertFeed (from 5.1), click [CLAIM]. Verify: callback_tasks.state changes to a claimed/active state. Alert disappears from feed or shows as acknowledged.

AUTOMATION: WF-94 Chaos_Escalation automates 5.1 end-to-end.`,
    tests: [
      { id: '5.1', text: 'Overdue callback triggers escalation',  verify: "After policy delay_minutes, escalation record created. Alert in AlertFeed with ESC badge." },
      { id: '5.2', text: 'SMS escalation action',                 verify: "SMS sent to roofer escalation phone with overdue details." },
      { id: '5.3', text: 'Call escalation action',                verify: "Twilio call made to escalation phone with TwiML voice message." },
      { id: '5.4', text: 'Email escalation action',               verify: "Email sent to roofer email with overdue details." },
      { id: '5.5', text: 'No escalation policy configured',       verify: "Escalation policy missing alert created." },
      { id: '5.6', text: 'All steps exhausted',                   verify: "No further escalations after last step. Alert indicates exhaustion." },
      { id: '5.7', text: 'Claim escalation from AlertFeed',       verify: "Operator clicks CLAIM. callback_tasks.state updated. Escalation resolved." },
    ]
  },
  {
    id: 'sec06',
    title: 'SEC 06: STORM MODE (WF-01 Storm)',
    directions: `Pre-requisite: Run lobotomy.sql. Ensure WF-01 Storm_Mode is active in n8n. Ensure at least one operator has an appointment in a service area ZIP today (for sector routing test 6.4).

6.1: Open StormDashboard (F4). Click the storm mode toggle to ACTIVATE. Verify: SELECT * FROM storm_events WHERE status = 'active' returns a row. Elapsed timer starts counting in the UI.

6.2: With storm mode active, call the Twilio number from test phone. Verify: storm IVR plays ("Press 1 for emergency, 2 for standard"). Press 1 and leave a message. Hang up.

6.3: After 6.2, verify: SELECT * FROM leads WHERE phone = '+12013203818' ORDER BY created_at DESC LIMIT 1. Check tags field contains AI-extracted fields (summary, urgency, zip_code, key_details). Check storm_event_id is set.

6.4: Check if an operator is assigned to the same ZIP as the lead. If yes: that operator's phone should receive a sector-specific SMS alert. If no: the roofer's escalation phone should receive a general storm alert SMS.

6.5: In StormDashboard, verify the metrics panel shows: Efficiency, Burnout Risk, Surge Capacity, Revenue Per Hour. Values should be non-zero if there's been activity.

6.6: In StormDashboard, find the notes section. Add a note (e.g. "Test note"). Verify: SELECT * FROM storm_events WHERE status = 'active' -- check notes field contains the text.

6.7: Click the storm mode toggle to DEACTIVATE. Verify: storm_events.status = 'ended'. Check roofer phone for summary SMS with call/lead/appointment counts.

6.8: Open BiosScreen > TUNING. Change storm sensitivity threshold. Save. Verify the value persists after navigating away and back.

AUTOMATION: Run WF-92 Storm_Lifecycle_Test from n8n.`,
    tests: [
      { id: '6.1', text: 'Activate storm mode from StormDashboard',                    verify: "storm_events record created. Storm mode active. Elapsed timer starts." },
      { id: '6.2', text: 'Inbound call during storm mode',                             verify: "Caller hears storm IVR. Emergency (digit 1) or standard (digit 2) recording." },
      { id: '6.3', text: 'LLM analysis of storm recording',                            verify: "Lead created with AI-extracted summary, urgency, ZIP, key_details." },
      { id: '6.4', text: 'Sector-based routing during storm',                          verify: "If operator in same ZIP today, SMS sent to that operator. Otherwise general escalation SMS." },
      { id: '6.5', text: 'Storm metrics (efficiency, burnout, surge capacity, rev/hr)', verify: "StormDashboard shows real-time metrics. Values update." },
      { id: '6.6', text: 'Storm note logging',                                         verify: "Append note via StormDashboard. Note persisted in DB." },
      { id: '6.7', text: 'Deactivate storm mode',                                      verify: "Storm event ended. Summary SMS sent to roofer." },
      { id: '6.8', text: 'Storm tuning (BiosScreen)',                                  verify: "Adjust storm sensitivity threshold in TUNING tab. Value persisted." },
    ]
  },
  {
    id: 'sec07',
    title: 'SEC 07: EMERGENCY FLOW',
    directions: `Pre-requisite: Ensure the roofer has escalation_phone set in the roofers table (verify in BiosScreen > IDENTITY). Run lobotomy.sql for new-lead test. Keep an existing lead for 7.2.

7.1: Call the Twilio number as a new lead. Navigate through the IVR to the emergency option (press 9 during the new lead menu, or navigate to "Press 9 for emergency" when it's offered). Verify: your roofer's escalation phone rings. If you don't answer within 20 seconds, verify voicemail prompt plays. Hang up. Check AlertFeed for emergency alert.

7.2: Do NOT lobotomize. Call again (existing lead path). Press 1 for emergency in the existing client menu. Same verification as 7.1. Additionally verify: SELECT COUNT(*) FROM leads WHERE phone = '+12013203818' is still 1 (no duplicate).

7.3: After either 7.1 or 7.2, check the roofer's phone for an SMS containing emergency details (caller phone, recording URL, lead info).

7.4: Check the roofer's email for an emergency notification email. (This depends on whether the email action is configured in the emergency path nodes of WF-01a.)`,
    tests: [

    directions: `20.1 Sold Out Slot: Via SQL, fully book the first available slot for a test operator (INSERT into operator_appointment_slots with status='booked' or UPDATE slots count to max). Call in, press 1 for SMS. Verify the SMS offers slots starting from the SECOND slot -- the fully-booked slot must not appear. Cross-check: SELECT * FROM operator_appointment_slots ORDER BY start_at LIMIT 5.

20.2 Zero Inventory: SET ALL slots for the next 7 days to blocked/booked for all operators: UPDATE operator_appointment_slots SET status='blocked' WHERE start_at BETWEEN NOW() AND NOW() + interval '7 days'. Call in, press 1 for SMS. Verify: system responds with a "fully booked, we will call you" message. No crash, no error log in Supabase Functions logs.

20.3 The Ghost / Abandonment: Book a slot by replying "1" to the SMS. Then do NOT reply with an address. Wait (or manually set the DB timestamp). Verify: after 24h, the appointment still exists with address=NULL and the slot is still held. NOTE: This is a known gap -- V2 TODO is auto-release of slots with no address after 24h. Document the behavior, do not mark FAIL unless the slot is incorrectly released.

20.4 Talkative User / Regex: After receiving the SMS slot list, reply with "I'll take number 1 thanks" (instead of bare "1"). Verify: WF-04 SMS handler either (a) extracts the digit "1" via regex and books correctly, OR (b) routes to human review queue. Either outcome is acceptable -- a crash or silent failure is not.

20.5 Double Tap / Idempotency: Reply "1" to book. Wait 2 seconds. Reply "1" again from the same phone. Verify: only one appointment is created (SELECT COUNT(*) FROM appointments WHERE lead_id = '<id>' should be 1). Second reply should receive an "Already scheduled" or similar SMS, NOT a double-booking.

20.6 Special Characters in Address: After booking (reply "1"), reply with an address containing apostrophes/accents: e.g. "123 O'Brien St, San José, CA 95112". Verify: no SQL error, address stored correctly in appointments.address, ZIP 95112 extracted correctly in AlertFeed.

20.7 Rapid-Fire Calls (Dedup): Call the Twilio number 3 times within 60 seconds from the same phone. Verify: only 1 lead record created -- SELECT COUNT(*) FROM leads WHERE phone = '<test_phone>' should be 1. The deduplication window should absorb the extra calls.

20.8 Business Hours Boundary: Set business hours close time to exactly 1 minute from now (in BiosScreen > SCHEDULE or directly via DB). Call in. Verify: system routes correctly -- if the call arrives after close, after-hours greeting plays; if before close, normal IVR plays. No mid-IVR hang or crash at the boundary.

20.9 Empty Voicemail: Call and reach the voicemail prompt. Immediately hang up without speaking. Verify: system handles the empty/zero-length recording gracefully -- no crash in Function logs, callback_tasks record created (possibly with null/empty transcription field), no unhandled exception.

20.10 Concurrent SMS Race (Last Slot): Using two different phones (or two simultaneous API calls via WF-90 Chaos Monkey), both reply "1" to the same SMS blast when only one slot remains. Verify: exactly one booking succeeds, the other receives an error/full SMS. SELECT COUNT(*) FROM appointments WHERE slot_id = '<last_slot_id>' should be 1.`,
    tests: [
      { id: '20.1',  text: 'Sold out slot -- first slot skipped in SMS',        verify: "SMS offers slots starting from second available. Fully-booked slot invisible." },
      { id: '20.2',  text: 'Zero inventory -- graceful fallback',                verify: "System says fully booked, will call back. No crash, no error log." },
      { id: '20.3',  text: 'Ghost / abandonment -- slot held with NULL address', verify: "Appointment exists with address=NULL after 24h. Slot not auto-released (known gap, document behavior)." },
      { id: '20.4',  text: 'Talkative user -- regex digit extraction',           verify: "Reply 'I'll take number 1 thanks' books correctly OR routes to human review. No crash." },
      { id: '20.5',  text: 'Double tap -- idempotency on duplicate reply',       verify: "Second '1' reply gets 'Already scheduled'. Only 1 appointment in DB." },
      { id: '20.6',  text: 'Special characters in address -- no SQL injection',  verify: "Address with apostrophes/accents stored correctly. ZIP parsed. No SQL error." },
      { id: '20.7',  text: 'Rapid-fire calls -- deduplication',                  verify: "3 calls in 60s produce 1 lead record." },
      { id: '20.8',  text: 'Business hours boundary -- correct routing',         verify: "Call at closing boundary routes to correct IVR path. No hang or crash." },
      { id: '20.9',  text: 'Empty voicemail -- graceful empty recording',        verify: "Hang up at voicemail prompt. No crash. callback_tasks created with null/empty transcription." },
      { id: '20.10', text: 'Concurrent SMS race -- last slot integrity',         verify: "Two simultaneous '1' replies to last slot: 1 books, 1 gets error SMS. DB count = 1." },
    ]
  },
  {
    id: 'sec21',
    title: 'SEC 21: OPERATOR EDGE CASES',
    directions: `21.1 Sick Day / Operator Block: Block an operator's availability via SQL: UPDATE operator_appointment_slots SET status='blocked' WHERE operator_id = '<target_operator_id>' AND start_at > NOW(). Alternatively call sre_block_operator() if available. Call in and go through the SMS flow. Verify: the blocked operator's slots do NOT appear in the SMS slot list. Cross-check get_available_slots() output.

21.2 Lazy Operator / Inactive: Set an operator to inactive: UPDATE operators SET is_active = false WHERE id = '<target_operator_id>'. Call in and go through the SMS flow. Verify: the inactive operator's slots are excluded from get_available_slots() results. After test, restore: UPDATE operators SET is_active = true WHERE id = '<target_operator_id>'.

21.3 Force Assignment / Take It: Create a test appointment (or use an existing unassigned one). Force-assign a specific operator via SQL: UPDATE appointments SET operator_id = '<target_operator_id>' WHERE id = '<appt_id>'. Alternatively, POST to the assignment endpoint with p_force_operator_id. Verify: the OperatorBoard reflects the assignment. appointments.operator_id = '<target_operator_id>' in DB.`,
    tests: [
      { id: '21.1', text: "Sick day -- blocked operator's slots excluded",  verify: "Blocked operator slots absent from SMS list and get_available_slots() output." },
      { id: '21.2', text: 'Lazy operator -- inactive operator excluded',     verify: "is_active=false operator excluded from slot generation and SMS list." },
      { id: '21.3', text: 'Force assignment -- take-it / p_force_operator_id', verify: "Force-assigned operator_id appears in appointments and OperatorBoard." },

  {
    id: 'sec22',
    title: 'SEC 22: DATA INTEGRITY',
    directions: `22.1 Storm Surge / Inventory Explosion: Activate storm mode from StormDashboard (F4). Verify WF-11 Heartbeat triggers extended slot generation. Check: SELECT COUNT(*) FROM operator_appointment_slots WHERE start_at > NOW() AND start_at < NOW() + interval '3 days' -- count should be significantly higher than normal (3 days of extended hours). Deactivate storm mode after verification.

22.2 Orphan Test / Partition Safety: Create a call event and its transcript: INSERT INTO call_events (...) then INSERT INTO transcripts (call_event_id, call_created_at, ...) VALUES (..., <same_created_at>, ...). Verify FK integrity across partitioned tables: SELECT t.call_created_at, c.created_at FROM transcripts t JOIN call_events c ON t.call_event_id = c.id WHERE t.call_event_id = '<test_id>'. transcripts.call_created_at must equal call_events.created_at exactly (partition key alignment).`,
    tests: [

/* ============================================================
 * STORAGE
 * ============================================================ */
const LS_KEY = 'roofsig-qa-v221';

function loadState() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(LS_KEY, JSON.stringify(state));
  document.getElementById('footer').textContent =
    'LAST UPDATED: ' + new Date().toISOString();
}

/* ============================================================
 * RENDER
 * ============================================================ */
const STATES = ['pending', 'pass', 'skip'];
const BADGE_TEXT = { pending: '[ ]', pass: '[P]', skip: '[-]' };

function buildChecklist() {
  const state = loadState();
  const container = document.getElementById('checklist');
  container.innerHTML = '';

  SECTIONS.forEach(sec => {
    const secOpen = state['_sec_' + sec.id] !== false; // default open

    const secEl = document.createElement('div');
    secEl.className = 'section';
    secEl.dataset.secId = sec.id;

    // count for section
    const counts = { pass: 0, skip: 0, total: sec.tests.length };
    sec.tests.forEach(t => {
      const s = state[t.id] || 'pending';
      if (s === 'pass') counts.pass++;
      if (s === 'skip') counts.skip++;
    });

    // header
    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = `<span class="sec-title">${sec.title}</span>
      <div class="sec-right">
        <span class="sec-progress" id="sp-${sec.id}">${counts.pass}/${counts.total} PASS${counts.skip > 0 ? ' · ' + counts.skip + ' SKIP' : ''}</span>
        <span class="collapse-indicator" id="ci-${sec.id}">${secOpen ? '[v]' : '[>]'}</span>
      </div>`;
    hdr.addEventListener('click', () => toggleSection(sec.id));
    secEl.appendChild(hdr);

    // directions
    const dir = document.createElement('div');
    dir.className = 'directions-block' + (secOpen ? ' open' : '');
    dir.id = 'dir-' + sec.id;
    dir.innerHTML = `<div class="directions-label">▶ DIRECTIONS</div>${escapeHtml(sec.directions)}`;
    secEl.appendChild(dir);

    // rows
    const rowsBlock = document.createElement('div');
    rowsBlock.className = 'rows-block' + (secOpen ? ' open' : '');
    rowsBlock.id = 'rows-' + sec.id;

    sec.tests.forEach(t => {
      const s = state[t.id] || 'pending';
      const row = document.createElement('div');
      row.className = 'test-row state-' + s;
      row.dataset.testId = t.id;
      row.innerHTML = `<span class="row-badge">${BADGE_TEXT[s]}</span><span class="row-id">${t.id}</span>
        <div class="row-content">
          <span class="row-text">${escapeHtml(t.text)}</span>
          <span class="row-verify">${escapeHtml(t.verify)}</span>
        </div>`;
      row.addEventListener('click', () => cycleState(t.id, sec.id));
      rowsBlock.appendChild(row);
    });

    secEl.appendChild(rowsBlock);
    container.appendChild(secEl);
  });

  updateProgress();
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleSection(secId) {
  const state = loadState();
  const isOpen = state['_sec_' + secId] !== false;
  state['_sec_' + secId] = !isOpen;
  saveState(state);

  const dirEl   = document.getElementById('dir-' + secId);
  const rowsEl  = document.getElementById('rows-' + secId);
  const ciEl    = document.getElementById('ci-' + secId);
  const nowOpen = !isOpen;

  dirEl.classList.toggle('open', nowOpen);
  rowsEl.classList.toggle('open', nowOpen);
  ciEl.textContent = nowOpen ? '[v]' : '[>]';
}

function cycleState(testId, secId) {
  const state = loadState();
  const cur = state[testId] || 'pending';
  const next = STATES[(STATES.indexOf(cur) + 1) % STATES.length];
  state[testId] = next;
  saveState(state);

  // update row
  const row = document.querySelector(`[data-test-id="${testId}"]`);
  if (row) {
    row.className = 'test-row state-' + next;
    row.querySelector('.row-badge').textContent = BADGE_TEXT[next];
  }

  // update section counter
  updateSectionProgress(secId, state);
  updateProgress();
}

function updateSectionProgress(secId, state) {
  const sec = SECTIONS.find(s => s.id === secId);
  if (!sec) return;
  let pass = 0, skip = 0;
  sec.tests.forEach(t => {
    const s = state[t.id] || 'pending';
    if (s === 'pass') pass++;
    if (s === 'skip') skip++;
  });
  const el = document.getElementById('sp-' + secId);
  if (el) el.textContent = `${pass}/${sec.tests.length} PASS${skip > 0 ? ' · ' + skip + ' SKIP' : ''}`;
}

function updateProgress() {
  const state = loadState();
  let total = 0, pass = 0;
  SECTIONS.forEach(sec => {
    sec.tests.forEach(t => {
      total++;
      if ((state[t.id] || 'pending') === 'pass') pass++;
    });
  });
  const pct = total > 0 ? Math.round(pass / total * 100) : 0;
  document.getElementById('progress-label').textContent =
    `PROGRESS: ${pass}/${total} (${pct}%)`;
  document.getElementById('progress-bar').style.width = pct + '%';
}

/* ============================================================
 * RESET
 * ============================================================ */
document.getElementById('btn-reset').addEventListener('click', () => {
  if (!confirm('RESET all test states to PENDING? This cannot be undone.')) return;
  localStorage.removeItem(LS_KEY);
  buildChecklist();
});

/* ============================================================
 * INIT
 * ============================================================ */
buildChecklist();

// Set footer to last saved time if any
(function() {
  const raw = localStorage.getItem(LS_KEY);
  if (raw) {
    try {
      const parsed = JSON.parse(raw);
      if (parsed._lastSaved) {
        document.getElementById('footer').textContent = 'LAST UPDATED: ' + parsed._lastSaved;
      }
    } catch {}
  }
})();
</script>
